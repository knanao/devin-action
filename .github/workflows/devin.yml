name: devin

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, ready_for_review]
  pull_request_review_comment:
    types: [created]

jobs:
  devin:
    if: |
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/devin')) ||
      (github.event_name == 'pull_request_review_comment' && startsWith(github.event.comment.body, '/devin')) ||
      (github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          devin-api-key: ${{ secrets.DEVIN_API_KEY }}
          devin-org-id:  ${{ secrets.DEVIN_ORG_ID }}
          github-token:  ${{ secrets.GITHUB_TOKEN }}
          api-version: v1
