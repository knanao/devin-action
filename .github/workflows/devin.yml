name: devin

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, ready_for_review]
  pull_request_review_comment:
    types: [created]

jobs:
  devin:
    if: |
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/devin')) ||
      (github.event_name == 'pull_request_review_comment' && startsWith(github.event.comment.body, '/devin')) ||
      (github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Devin action
        env:
          INPUT_DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          INPUT_DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          INPUT_API_VERSION: v1
        run: python -m src.main
