# Example workflow — copy this into a consumer repository (e.g. .github/workflows/devin.yml).
name: devin

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, ready_for_review]
  pull_request_review_comment:
    types: [created]
  check_run:
    types: [completed]

jobs:
  devin:
    # Only run when there's a meaningful trigger. Fine-tune per event as needed.
    if: |
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/devin')) ||
      (github.event_name == 'pull_request_review_comment' && startsWith(github.event.comment.body, '/devin')) ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'check_run' && github.event.check_run.conclusion != 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: knanao/devin-action@v1
        with:
          devin-api-key: ${{ secrets.DEVIN_API_KEY }}
          devin-org-id:  ${{ secrets.DEVIN_ORG_ID }}
